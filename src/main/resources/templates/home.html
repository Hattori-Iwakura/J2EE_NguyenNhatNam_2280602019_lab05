<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Trang chủ - Bees Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <style>
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 80px 0;
        }
        .hero h1 { font-size: 3rem; font-weight: 700; }
        .hero p { font-size: 1.25rem; opacity: .85; }
        .stat-card { border-radius: 16px; border: none; transition: transform .2s; }
        .stat-card:hover { transform: translateY(-4px); }
        .product-card { border-radius: 12px; border: 1px solid #e9ecef; transition: box-shadow .2s; overflow: hidden; }
        .product-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.12); }
        .product-card img { width: 100%; height: 160px; object-fit: contain; background: #f8f9fa; padding: 12px; }
        .category-pill { cursor: pointer; transition: all .2s; border-radius: 50px; }
        .category-pill:hover { transform: scale(1.05); }
        .section-title { font-weight: 700; font-size: 1.6rem; position: relative; padding-bottom: 10px; }
        .section-title::after { content: ''; position: absolute; bottom: 0; left: 0; width: 50px; height: 3px; background: #0d6efd; border-radius: 2px; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{_layout :: navbar}"></div>

<!-- Hero -->
<section class="hero">
    <div class="container text-center">
        <h1>🛒 Bees Products</h1>
        <p class="mt-3">Khám phá hàng ngàn sản phẩm chất lượng cao với giá tốt nhất</p>
        <div class="d-flex justify-content-center gap-3 mt-4">
            <form th:action="@{/products}" method="get" class="d-flex gap-2">
                <input type="text" class="form-control form-control-lg" name="keyword"
                       placeholder="Tìm kiếm sản phẩm..." style="min-width: 320px;">
                <button type="submit" class="btn btn-warning btn-lg fw-bold">Tìm ngay</button>
            </form>
        </div>
        <div class="mt-3 d-flex justify-content-center gap-2 flex-wrap">
            <span class="badge bg-light text-dark fs-6 px-3 py-2">📱 Điện thoại</span>
            <span class="badge bg-light text-dark fs-6 px-3 py-2">💻 Laptop</span>
        </div>
    </div>
</section>

<!-- Stats -->
<section class="py-4">
    <div class="container">
        <div class="row g-3 justify-content-center">
            <div class="col-md-4 col-6">
                <div class="stat-card card text-center p-4 bg-primary text-white shadow-sm">
                    <div class="fs-1 fw-bold" th:text="${totalProducts}">0</div>
                    <div class="mt-1 opacity-75">Sản phẩm</div>
                </div>
            </div>
            <div class="col-md-4 col-6">
                <div class="stat-card card text-center p-4 bg-success text-white shadow-sm">
                    <div class="fs-1 fw-bold" th:text="${totalCategories}">0</div>
                    <div class="mt-1 opacity-75">Danh mục</div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Categories -->
<section class="py-4 bg-white">
    <div class="container">
        <h2 class="section-title mb-4">Danh mục sản phẩm</h2>
        <div class="row g-3">
            <div class="col-md-6 col-sm-6" th:each="cat : ${categories}">
                <a th:href="@{/products(categoryId=${cat.id})}" class="text-decoration-none">
                    <div class="category-pill card p-4 text-center shadow-sm border-0 bg-light">
                        <div class="fs-1" th:text="${cat.id == 1 ? '📱' : '💻'}"></div>
                        <div class="fw-bold mt-2 fs-5" th:text="${cat.name}"></div>
                        <div class="text-muted small mt-1">Xem tất cả sản phẩm →</div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</section>

<!-- Featured Products -->
<section class="py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="section-title">Sản phẩm nổi bật</h2>
            <a th:href="@{/products}" class="btn btn-outline-primary">Xem tất cả →</a>
        </div>
        <div class="row g-3">
            <div class="col-md-4 col-sm-6" th:each="product : ${featuredProducts}">
                <div class="product-card card h-100">
                    <img th:if="${product.image != null}"
                         th:src="${product.image != null and product.image.startsWith('http') ? product.image : '/images/' + product.image}"
                         th:alt="${product.name}">
                    <div class="card-body">
                        <span class="badge bg-secondary mb-2"
                              th:text="${product.category != null ? product.category.name : ''}"></span>
                        <h6 class="card-title fw-bold" th:text="${product.name}"></h6>
                        <p class="text-danger fw-bold mb-2">
                            <span th:text="${#numbers.formatInteger(product.price, 1, 'COMMA')}"></span> ₫
                        </p>
                        <a th:href="@{/products/edit/{id}(id=${product.id})}"
                           class="btn btn-sm btn-outline-primary w-100">Xem chi tiết</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{_layout :: footer}"></div>
</body>
</html>

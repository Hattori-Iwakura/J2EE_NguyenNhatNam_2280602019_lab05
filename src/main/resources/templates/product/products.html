<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>List products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body>
<div th:replace="~{_layout :: navbar}"></div>
<div class="container mt-4">

    <!-- Search & Filter bar -->
    <form th:action="@{/products}" method="get" class="row g-2 mb-3 align-items-center">
        <div class="col-auto">
            <input type="text" class="form-control" name="keyword" th:value="${keyword}"
                   placeholder="Tìm kiếm sản phẩm...">
        </div>
        <div class="col-auto">
            <select class="form-select" name="categoryId">
                <option value="0" th:selected="${selectedCategoryId == 0}">-- Tất cả danh mục --</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}"
                        th:selected="${selectedCategoryId == c.id}"></option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            <a th:href="@{/products}" class="btn btn-secondary ms-1">Xóa lọc</a>
        </div>
        <div class="col-auto ms-auto">
            <a th:href="@{/products/create}" class="btn btn-success">+ Thêm sản phẩm</a>
        </div>
    </form>

    <!-- Category pills -->
    <div class="mb-3 d-flex gap-2 flex-wrap">
        <a th:href="@{/products(keyword=${keyword})}"
           th:classappend="${selectedCategoryId == 0} ? ' active' : ''"
           class="btn btn-sm btn-outline-dark">Tất cả</a>
        <a th:each="c : ${categories}"
           th:href="@{/products(keyword=${keyword}, categoryId=${c.id})}"
           th:text="${c.name}"
           th:classappend="${selectedCategoryId == c.id} ? ' active' : ''"
           class="btn btn-sm btn-outline-dark"></a>
    </div>

    <!-- Result count -->
    <p class="text-muted small">
        Tìm thấy <strong th:text="${#lists.size(listproduct)}"></strong> sản phẩm
        <span th:if="${keyword != null and !keyword.isEmpty()}">
            với từ khoá "<strong th:text="${keyword}"></strong>"
        </span>
        <span th:if="${selectedCategoryId != 0}">
            trong danh mục "<strong th:each="c : ${categories}" th:if="${c.id == selectedCategoryId}" th:text="${c.name}"></strong>"
        </span>
    </p>
    <table class="table table-striped">
        <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Price</th>
            <th scope="col">Image</th>
            <th scope="col">Category Name</th>
            <th scope="col"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${listproduct}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price}"></td>
            <td>
                <img th:if="${product.image != null}" height="120" width="150"
                     th:src="${product.image != null and product.image.startsWith('http') ? product.image : '/images/' + product.image}"
                     th:alt="${product.name}" />
            </td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td>
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-secondary">Edit</a>
                <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div th:replace="~{_layout :: footer}"></div>
</body>
</html>

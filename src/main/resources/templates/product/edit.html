<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Edit product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body>
<div th:replace="~{_layout :: navbar}"></div>
<div class="container mt-4">
    <form th:action="@{/products/edit}" th:object="${product}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control" id="name" placeholder="product Name">
            <div th:if="${#fields.hasErrors('name')}" class="alert alert-warning" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label for="price" class="form-label">Price:</label>
            <input type="number" th:field="*{price}" class="form-control" id="price">
            <div th:if="${#fields.hasErrors('price')}" class="alert alert-warning" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Current Image:</label><br />
            <img th:if="${product.image != null}" height="100"
                 th:src="${product.image != null and product.image.startsWith('http') ? product.image : '/images/' + product.image}"
                 th:alt="${product.name}" />
        </div>

        <div class="mb-3">
            <label for="imageProduct" class="form-label">Change Image:</label>
            <input type="file" class="form-control" id="imageProduct" name="imageProduct">
        </div>

        <div class="mb-3">
            <label for="category" class="form-label">Category:</label>
            <select class="form-select" id="category" name="categoryId">
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}"
                        th:selected="${product.category != null and product.category.id == c.id}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
<div th:replace="~{_layout :: footer}"></div>
</body>
</html>

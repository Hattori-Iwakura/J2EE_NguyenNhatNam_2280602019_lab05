<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chỉnh sửa sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .page-header { background: linear-gradient(135deg, #0f172a, #1e3a5f); color: #fff; padding: 2rem 0 1.5rem; margin-bottom: 2rem; }
        .form-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,.08); overflow: hidden; }
        .form-card-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 1.25rem 1.75rem; }
        .form-card-body { padding: 2rem 1.75rem; }
        .form-label { font-weight: 600; font-size: .875rem; color: #374151; margin-bottom: .4rem; }
        .form-control, .form-select { border-radius: 9px; border-color: #e2e8f0; font-size: .9rem; padding: .6rem .9rem; }
        .form-control:focus, .form-select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
        .btn-save { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: #fff; border: none; border-radius: 9px; padding: .65rem 2rem; font-weight: 600; font-size: .95rem; transition: opacity .2s; }
        .btn-save:hover { opacity: .88; color: #fff; }
        .btn-cancel { border-radius: 9px; padding: .65rem 1.5rem; font-weight: 600; font-size: .95rem; }
        .required-star { color: #e11d48; }
        .current-img { max-height: 110px; max-width: 180px; border-radius: 10px; border: 1px solid #e2e8f0; object-fit: contain; background: #f8fafc; padding: 4px; }
        .preview-img { max-height: 110px; max-width: 180px; border-radius: 10px; border: 2px solid #3b82f6; object-fit: contain; background: #f8fafc; padding: 4px; display: none; }
        .img-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; margin-bottom: .4rem; }
    </style>
</head>
<body>
<div th:replace="~{_layout :: navbar}"></div>

<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb text-white-50 mb-2 small">
                <li class="breadcrumb-item"><a th:href="@{/products}" class="text-white-50 text-decoration-none">Sản phẩm</a></li>
                <li class="breadcrumb-item active text-white">Chỉnh sửa</li>
            </ol>
        </nav>
        <h1 class="mb-0 fw-bold fs-3"><i class="bi bi-pencil-square me-2 text-warning"></i>Chỉnh sửa sản phẩm</h1>
    </div>
</div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="form-card">
                <div class="form-card-header d-flex align-items-center gap-2">
                    <i class="bi bi-pencil text-warning fs-5"></i>
                    <span class="fw-semibold">Cập nhật thông tin</span>
                    <span class="ms-auto badge bg-primary bg-opacity-10 text-primary fw-normal small"
                          th:text="'ID: #' + ${product.id}"></span>
                </div>
                <div class="form-card-body">
                    <form th:action="@{/products/edit}" th:object="${product}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-4">
                            <label class="form-label">Tên sản phẩm <span class="required-star">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control"
                                   placeholder="Nhập tên sản phẩm...">
                            <div th:if="${#fields.hasErrors('name')}" class="mt-2">
                                <span class="text-danger small"><i class="bi bi-exclamation-circle me-1"></i><span th:errors="*{name}"></span></span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Giá bán (VNĐ) <span class="required-star">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-white">₫</span>
                                <input type="number" th:field="*{price}" class="form-control" min="1">
                            </div>
                            <div th:if="${#fields.hasErrors('price')}" class="mt-2">
                                <span class="text-danger small"><i class="bi bi-exclamation-circle me-1"></i><span th:errors="*{price}"></span></span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Danh mục <span class="required-star">*</span></label>
                            <select class="form-select" name="categoryId">
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                                        th:selected="${product.category != null and product.category.id == c.id}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Hình ảnh</label>
                            <div th:if="${product.image != null and !product.image.isEmpty()}" class="mb-2">
                                <p class="img-label">Ảnh hiện tại</p>
                                <img id="currentImg"
                                     th:src="${product.image.startsWith('http') ? product.image : '/images/' + product.image}"
                                     th:alt="${product.name}" class="current-img">
                            </div>
                            <input type="file" class="form-control" id="imageProduct" name="imageProduct"
                                   accept="image/*" onchange="previewNewImage(this)">
                            <p class="form-text mt-1"><i class="bi bi-info-circle me-1"></i>Để trống nếu không muốn thay đổi ảnh</p>
                            <div id="newImgWrap" style="display:none" class="mt-2">
                                <p class="img-label">Ảnh mới</p>
                                <img id="imgPreview" class="preview-img" src="" alt="Preview">
                            </div>
                        </div>

                        <hr class="my-4">
                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-save">
                                <i class="bi bi-check-lg me-1"></i>Lưu thay đổi
                            </button>
                            <a th:href="@{/products}" class="btn btn-light btn-cancel border">
                                <i class="bi bi-arrow-left me-1"></i>Quay lại
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{_layout :: footer}"></div>
<script>
function previewNewImage(input) {
    const preview = document.getElementById('imgPreview');
    const wrap = document.getElementById('newImgWrap');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; wrap.style.display = 'block'; };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
</body>
</html>

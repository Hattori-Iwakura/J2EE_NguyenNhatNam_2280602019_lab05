<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .main-navbar {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            box-shadow: 0 2px 12px rgba(0,0,0,.3);
            padding: 0.6rem 0;
        }
        .main-navbar .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: #fff !important;
            letter-spacing: -0.3px;
        }
        .main-navbar .nav-link {
            color: rgba(255,255,255,.75) !important;
            font-weight: 500;
            padding: .45rem .85rem;
            border-radius: 8px;
            transition: all .2s;
        }
        .main-navbar .nav-link:hover, .main-navbar .nav-link.active {
            color: #fff !important;
            background: rgba(255,255,255,.1);
        }
        .main-navbar .search-input {
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.15);
            color: #fff;
            border-radius: 8px;
            padding: .4rem .9rem;
        }
        .main-navbar .search-input::placeholder { color: rgba(255,255,255,.45); }
        .main-navbar .search-input:focus {
            background: rgba(255,255,255,.15);
            border-color: rgba(255,255,255,.3);
            color: #fff;
            box-shadow: none;
            outline: none;
        }
        .site-footer {
            background: #0f172a;
            color: rgba(255,255,255,.5);
            padding: 1.5rem 0;
            font-size: .875rem;
        }
        .site-footer a { color: rgba(255,255,255,.6); text-decoration: none; }
        .site-footer a:hover { color: #fff; }
    </style>
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav th:fragment="navbar" class="main-navbar navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-bag-heart-fill text-warning"></i>
            ShopManager
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <i class="bi bi-list text-white fs-4"></i>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto ms-3 gap-1">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}"><i class="bi bi-grid me-1"></i>Sản phẩm</a>
                </li>
            </ul>
            <form class="d-flex gap-2" th:action="@{/products}" method="get">
                <input class="form-control search-input" type="search" name="keyword"
                       placeholder="Tìm kiếm sản phẩm..." style="width:240px;">
                <button class="btn btn-warning fw-semibold px-3" type="submit">
                    <i class="bi bi-search me-1"></i>Tìm
                </button>
            </form>
            <a th:href="@{/products/create}" class="btn btn-success ms-2 fw-semibold">
                <i class="bi bi-plus-lg me-1"></i>Thêm mới
            </a>
        </div>
    </div>
</nav>

<!-- FOOTER -->
<footer th:fragment="footer" class="site-footer mt-5">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
                <span class="fw-semibold text-white"><i class="bi bi-bag-heart-fill text-warning me-1"></i>ShopManager</span>
                <span class="ms-2">&copy; 2025 – Phát triển ứng dụng với J2EE</span>
            </div>
            <div class="col-md-6 text-md-end mt-2 mt-md-0">
                <span class="me-3">Spring Boot &bull; Thymeleaf &bull; JPA &bull; MySQL</span>
            </div>
        </div>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
